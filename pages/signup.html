<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up Page</title>
    <link rel="stylesheet" href="/src/output.css">
</head>

<body class="flex flex-col min-h-screen bg-teal-200 font-family">

  <!-- ── MAIN (flex-1 so it fills all space between nav and footer) ── -->
  <main class="flex-1 flex items-center justify-center p-4 sm:p-8 py-12">
    <!-- Card -->
    <div class="w-full max-w-3xl rounded-2xl overflow-hidden shadow-2xl flex flex-col md:flex-row">

      <!-- LEFT: Teal panel -->
      <div class="w-full md:w-2/5 flex flex-col justify-between p-8 md:p-10 relative overflow-hidden bg-[#3aab97]">

        <div class="absolute -top-12 -left-12 w-48 h-48 rounded-full bg-white/5 pointer-events-none"></div>
        <div class="absolute -bottom-16 -right-10 w-56 h-56 rounded-full bg-white/5 pointer-events-none"></div>

        <!-- Logo -->
        <div class="relative z-10">
          <p class="font-extrabold text-2xl tracking-wide leading-none text-white">
          
          </p>
        </div>

        <!-- Info items -->
        <div class="relative z-10 mt-10 space-y-5">

          <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0 mt-0.5">
              <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </div>
            <div>
              <p class="text-white font-bold text-sm">Free to Join</p>
              <p class="text-white/60 text-xs leading-relaxed">Create your account in just a few steps</p>
            </div>
          </div>

          <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0 mt-0.5">
              <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div>
              <p class="text-white font-bold text-sm">Exclusive Deals</p>
              <p class="text-white/60 text-xs leading-relaxed">Members get access to special travel offers</p>
            </div>
          </div>

          <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center flex-shrink-0 mt-0.5">
              <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 21S5 13.5 5 8.5a7 7 0 1114 0C19 13.5 12 21 12 21z"/>
                <circle cx="12" cy="8.5" r="2.2" stroke-width="1.8"/>
              </svg>
            </div>
            <div>
              <p class="text-white font-bold text-sm">Plan Trips</p>
              <p class="text-white/60 text-xs leading-relaxed">Manage all your Cambodia adventures in one place</p>
            </div>
          </div>

        </div>

        <!-- Footer note inside panel -->
        <div class="hidden md:block relative z-10 mt-10 pt-6 border-t border-white/20">
          <p class="text-xs font-medium text-white/40"></p>
        </div>

      </div>

      <!-- RIGHT: White form -->
      <div class="bg-white flex-1 p-8 md:p-10">

        <h2 class="font-extrabold text-2xl text-gray-800 mb-1">Create Account</h2>
        <p class="text-sm text-gray-400 mb-6">Join CamTravel and start your journey</p>

        <div class="space-y-4">

          <!-- Full Name + Username -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
              <div class="flex items-center gap-3 border-b border-gray-300 pb-2 focus-within:border-[#3aab97] transition-colors duration-200">
                <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <circle cx="12" cy="8" r="4"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
                <input type="text" placeholder="Dara Chan"
                  class="w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 outline-none"/>
              </div>
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
              <div class="flex items-center gap-3 border-b border-gray-300 pb-2 focus-within:border-[#3aab97] transition-colors duration-200">
                <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
                </svg>
                <input type="text" placeholder="darachan"
                  class="w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 outline-none"/>
              </div>
            </div>
          </div>

          <!-- Email -->
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
            <div class="flex items-center gap-3 border-b border-gray-300 pb-2 focus-within:border-[#3aab97] transition-colors duration-200">
              <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="5" width="20" height="14" rx="2.5"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2 8l10 6.5L22 8"/>
              </svg>
              <input type="email" placeholder="you@example.com"
                class="w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 outline-none"/>
            </div>
          </div>

          <!-- Password + Confirm Password -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
              <div class="flex items-center gap-3 border-b border-gray-300 pb-2 focus-within:border-[#3aab97] transition-colors duration-200">
                <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
                <input type="password" placeholder="Min. 8 characters"
                  class="w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 outline-none"/>
              </div>
            </div>
            <div>
              <label class="block text-sm font-bold text-gray-700 mb-2">Confirm Password</label>
              <div class="flex items-center gap-3 border-b border-gray-300 pb-2 focus-within:border-[#3aab97] transition-colors duration-200">
                <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
                <input type="password" placeholder="Repeat password"
                  class="w-full bg-transparent text-sm text-gray-700 placeholder-gray-400 outline-none"/>
              </div>
            </div>
          </div>

          <!-- Terms -->
          <div class="flex items-start gap-2 pt-1">
            <input type="checkbox" id="terms"
              class="mt-0.5 w-4 h-4 rounded accent-[#3aab97] cursor-pointer flex-shrink-0"/>
            <label for="terms" class="text-xs text-gray-500 leading-relaxed cursor-pointer">
              I agree to the
              <a href="#" class="text-[#3aab97] font-bold hover:underline">Terms of Service</a>
              and
              <a href="#" class="text-[#3aab97] font-bold hover:underline">Privacy Policy</a>
            </label>
          </div>

          <!-- Submit -->
          <button type="button"
            class="w-full bg-[#3aab97] hover:bg-[#2d9282] active:bg-[#227569] text-white
                   font-bold text-sm tracking-wide py-3.5 rounded-xl transition-colors duration-200">
            Create Account
          </button>

          <!-- Login link -->
          <p class="text-center text-xs text-gray-400">
            Already have an account?
            <a href="./pages/login.html" class="text-teal-500 font-bold hover:underline">Login</a>
          </p>

        </div>
      </div>

    </div>
  </main>

  <!-- Scroll to Top Button -->
  <button id="scrollTopBtn"
    class="fixed bottom-8 right-8 w-12 h-12 bg-white/80 hover:bg-white rounded-full shadow-lg
           flex items-center justify-center transition-all duration-300 opacity-0 invisible z-50">
    <svg class="w-6 h-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
    </svg>
  </button>

  <!-- Footer & Navbar components -->
  <div id="footer-container"></div>
  <script src="../components/navbar.js"></script>
  <script src="../components/footer.js"></script>

</body>
</html>
