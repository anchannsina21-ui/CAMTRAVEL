<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up Page</title>
    <link rel="stylesheet" href="/src/output.css">
</head>

<body class="min-h-screen bg-gradient-to-br from-teal-50 to-teal-100 flex flex-col">

  <div class="flex items-center justify-center m-4 px-4 md:px-12 py-8 md:py-12 pt-10 md:pt-16">

    <!-- Main Card -->
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl p-6 md:p-10 flex flex-col md:flex-row gap-10 md:gap-20">

        <!-- Left: Form -->
        <div class="flex-1 grid col-span-2">

          <div class="w-16 h-16 bg-teal-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-teal-600" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </div>

          <h1 class="font-logo text-2xl md:text-3xl font-black text-center text-gray-800 mb-1">
            Welcome Back
          </h1>

          <p class="text-center text-gray-400 mb-8 text-sm">
            Sign up to your CamTravel account
          </p>

          <div class="space-y-5">

            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1">
                Email Address
              </label>

              <input type="email" placeholder="you@example.com"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-teal-400 transition"/>
            </div>

            <div>
              <label class="block text-sm font-semibold text-gray-600 mb-1">
                Password
              </label>

              <input type="password" placeholder="••••••••"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-teal-400 transition"/>
            </div>

            <div class="flex items-center justify-between text-sm flex-wrap gap-2">

              <label class="flex items-center gap-2 text-gray-500">
                <input type="checkbox" class="rounded"/> Remember me
              </label>

              <a href="#" class="text-teal-500 hover:text-teal-600 font-semibold">
                Forgot password?
              </a>

            </div>

            <button class="w-full bg-teal-500 hover:bg-teal-400 text-white font-bold py-3 rounded-xl transition text-lg shadow-md">
              Sign Up
            </button>

          </div>

          <div class="my-6 flex items-center gap-3">
            <hr class="flex-1 border-gray-200"/>
            <span class="text-gray-400 text-sm">or</span>
            <hr class="flex-1 border-gray-200"/>
          </div>

          <button class="w-full border border-gray-200 rounded-xl py-3 flex items-center justify-center gap-3 text-gray-600 hover:bg-gray-50 transition font-semibold">

            <svg class="w-5 h-5" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>

            Continue with Google
          </button>

          <p class="text-center text-gray-500 text-sm mt-8">
            Don't have an account?
            <a href="/pages/login.html" class="text-teal-500 hover:text-teal-600 font-bold">
              Sign up
            </a>
          </p>

        </div>

        <!-- Right: Image -->
        <div class="flex-1 flex items-center justify-center">
          <img src="/assets/Login.gif"
               class="w-full max-w-xs md:max-w-md h-auto rounded-2xl"
               alt="Angkor Tom">
        </div>

    </div>
  </div>

  <!-- Scroll to Top Button -->
  <button id="scrollTopBtn"
  class="fixed bottom-6 right-6 md:bottom-8 md:right-8 w-12 h-12 bg-white/80 hover:bg-white rounded-full shadow-lg flex items-center justify-center transition-all duration-300 opacity-0 invisible z-50">
      <svg class="w-6 h-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
      </svg>
  </button>

  <div id="footer-container"></div>

  <!-- Script JS -->
  <script src="/components/footer.js"></script>
  <script src="/components/navbar.js"></script>
  <script src="/components/signup.js"></script>

</body>
</html>
