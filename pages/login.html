<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login </title>
    <link rel="stylesheet" href="/src/output.css">
</head>
<body class="min-h-screen bg-teal-200 flex flex-col font-family" >

  <!-- Card Section -->
  <div class="flex justify-center items-center px-4 py-16">
    <div class="w-full max-w-3xl rounded-2xl overflow-hidden flex flex-col md:flex-row shadow-2xl">
      <!-- LEFT: Teal panel -->
      <div class="w-full md:w-2/5 flex flex-col justify-between p-8 md:p-10 relative overflow-hidden bg-[#3aab97]">

        <div class="absolute -top-12 -left-12 w-48 h-48 rounded-full bg-white/5 pointer-events-none"></div>
        <div class="absolute -bottom-16 -right-10 w-56 h-56 rounded-full bg-white/5 pointer-events-none"></div>
        <!-- Welcome text -->
        <div class="relative z-10 mt-10 space-y-3">
          <div class="w-14 h-14 rounded-full bg-white/20 flex items-center justify-center">
            <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
            </svg>
          </div>
          <h2 class="text-white font-black text-2xl leading-snug">Welcome<br/>Back!</h2>
          <p class="text-white/65 text-sm leading-relaxed font-medium">
            Sign in to continue planning your perfect Cambodian journey.
          </p>
        </div>
      </div>

      <!-- RIGHT: White form -->
      <div class="bg-white flex-1 p-8 md:p-10">

        <h2 class="font-extrabold text-2xl text-gray-800 mb-1">Sign In</h2>
        <p class="text-sm text-gray-400 font-medium mb-7">Sign in to your CamTravel account</p>

        <div class="space-y-5">
          <!-- Email -->
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Email Address</label>
            <input type="email" placeholder="you@example.com"
              class="w-full border-b border-gray-300 pb-2 bg-transparent text-sm text-gray-700
                     placeholder-gray-400 outline-none focus:border-[#3aab97] transition-colors duration-200"/>
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
            <input type="password" placeholder="••••••••"
              class="w-full border-b border-gray-300 pb-2 bg-transparent text-sm text-gray-700
                     placeholder-gray-400 outline-none focus:border-[#3aab97] transition-colors duration-200"/>
          </div>

          <!-- Remember + Forgot -->
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 text-gray-500 font-medium cursor-pointer">
              <input type="checkbox" class="accent-[#3aab97] rounded"/> Remember me
            </label>
            <a href="/pages/signup.html" class="text-[#3aab97] hover:text-[#2d9282] font-bold">Forgot password?</a>
          </div>

          <!-- Sign In button -->
          <button type="button"
            class="w-full bg-[#3aab97] hover:bg-[#2d9282] active:bg-[#227569] text-white
                   font-bold text-sm tracking-wide py-3.5 rounded-xl transition-colors duration-200">
            Sign In
          </button>

        </div>

        <!-- Divider -->
        <div class="my-6 flex items-center gap-3">
          <hr class="flex-1 border-gray-200"/>
          <span class="text-gray-400 text-xs font-semibold">or</span>
          <hr class="flex-1 border-gray-200"/>
        </div>

        <!-- Google -->
        <button type="button"
          class="w-full border border-gray-200 rounded-xl py-3 flex items-center justify-center gap-3
                 text-gray-600 hover:bg-gray-50 transition-colors duration-200 font-semibold text-sm mb-3">
          <svg class="w-5 h-5" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

        <!-- Sign up link -->
        <p class="text-center text-gray-400 text-xs mt-6 font-medium">
          Don't have an account?
          <a href="/pages/signup.html" class="text-[#3aab97] hover:text-[#2d9282] font-bold">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Scroll to Top Button -->
  <button id="scrollTopBtn"
    class="fixed bottom-8 right-8 w-12 h-12 bg-white/80 hover:bg-white rounded-full shadow-lg
           flex items-center justify-center transition-all duration-300 opacity-0 invisible z-50">
    <svg class="w-6 h-6 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
    </svg>
  </button>

  <!-- Footer & Navbar components -->
  <div id="footer-container"></div>
  <script src="/components/navbar.js"></script>
  <script src="/components/footer.js"></script>
  <script src="/components/login.js"></script>

</body>
</html>
